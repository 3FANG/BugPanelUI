name: bug-reports

services:
  adminer:
    image: adminer
    container_name: adminer_bug_reports
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - mynet
    depends_on:
      - postgres

  api:
    build: app/
    # image: denzodev/modsapi:v1.0
    container_name: bug_reports_api
    ports:
      - "8000:80"
    depends_on:
      - postgres
    networks:
      - mynet
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    container_name: db_postgres_bug_reports
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - mynet

networks:
  mynet:
    driver: bridge

volumes:
  postgres-data: